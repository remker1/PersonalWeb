# ── Main site (legacy self-hosted, still serves as fallback) ──────────────────
server {
    listen 80;
    server_name remker1.dev www.remker1.dev _;

    client_max_body_size 10M;

    # Frontend static files
    root /usr/share/nginx/html;
    index index.html;

    # API requests → backend container
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploaded photos → backend container
    location /uploads/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── LibreTranslate proxy (translate.remker1.dev) ──────────────────────────────
server {
    listen 80;
    server_name translate.remker1.dev;

    # Only allow POST /translate (everything else 404)
    location = /translate {
        proxy_pass http://libretranslate:5000/translate;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # CORS for Vercel functions
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    location / {
        return 404;
    }
}
